name: Daily Repository Update

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log file - 24f3003921@ds.study.iitm.ac.in
        run: |
          echo "Daily update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> daily_log.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_log.txt
          git commit -m "chore: daily automated update $(date -u '+%Y-%m-%d')"
          git push
